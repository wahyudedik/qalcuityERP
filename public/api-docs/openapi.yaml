    post:
      tags: [Manufacturing]
      summary: Create production order
      operationId: createProductionOrder
      responses:
        '201':
          description: Production order created
      security:
        - Sanctum: []

  # ── Webhooks ──────────────────────────────────────────
  /webhooks/shopee:
    post:
      tags: [Webhooks]
      summary: Handle Shopee webhook
      operationId: handleShopeeWebhook
      responses:
        '200':
          description: Webhook processed
      security: []

  /webhooks/tokopedia:
    post:
      tags: [Webhooks]
      summary: Handle Tokopedia webhook
      operationId: handleTokopediaWebhook
      responses:
        '200':
          description: Webhook processed
      security: []

  # ── Health Check ──────────────────────────────────────
  /health:
    get:
      tags: [Health Check]
      summary: Basic health check
      operationId: healthCheck
      responses:
        '200':
          description: System healthy
      security: []

  /health/detailed:
    get:
      tags: [Health Check]
      summary: Detailed health check
      operationId: detailedHealthCheck
      responses:
        '200':
          description: Detailed system status
      security: []

components:
  securitySchemes:
    ApiToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API token with read/write abilities
    Sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Laravel Sanctum authentication token

  schemas:
    ProductList:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        meta:
          type: object
          properties:
            current_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer

    Product:
      type: object
      properties:
        id:
          type: integer
        product_code:
          type: string
        name:
          type: string
        price:
          type: number
        stock:
          type: integer
        tenant_id:
          type: integer

    OrderCreate:
      type: object
      required:
        - customer_id
        - items
      properties:
        customer_id:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              quantity:
                type: integer
              price:
                type: number
        notes:
          type: string

    PatientCreate:
      type: object
      required:
        - mrn
        - full_name
      properties:
        mrn:
          type: string
          description: Medical Record Number
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, other]
        phone:
          type: string
        email:
          type: string
