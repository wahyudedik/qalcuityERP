<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Qalcuity ERP</title>
    <style>
        body {
            font-family: Inter, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            text-align: center;
            padding: 2rem;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        button {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Periksa koneksi internet Anda dan coba lagi.</p>
        <button onclick="location.reload()">Coba Lagi</button>
    </div>
</body>

</html>
